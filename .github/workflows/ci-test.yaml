name: CI - Test

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Cache system (apt) dependencies
        uses: actions/cache@v4
        with:
          path: apt-archives
          key: ${{ runner.os }}-apt-unit-test-${{ hashFiles('**/.github/workflows/ci-test.yaml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        run: |
          mkdir -p apt-archives
          sudo cp -a apt-archives /var/cache/apt/archives # workaround for apt-get cache https://github.com/actions/cache/issues/324#issuecomment-1816908646
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev pkg-config
          cp -a /var/cache/apt/archives/*.deb apt-archives 2>/dev/null || true

      - name: Extract Go version from go.mod
        run: sed -En 's/^go (.*)$/GO_VERSION=\1/p' go.mod >> "$GITHUB_ENV"

      - name: Set up Go with cache
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache-dependency-path: ./go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: make unit-test

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Cache system (apt) dependencies
        uses: actions/cache@v4
        with:
          path: apt-archives
          key: ${{ runner.os }}-apt-e2e-test-${{ hashFiles('**/.github/workflows/ci-test.yaml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        run: |
          mkdir -p apt-archives
          sudo cp -a apt-archives /var/cache/apt/archives # workaround for apt-get cache https://github.com/actions/cache/issues/324#issuecomment-1816908646
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev pkg-config
          cp -a /var/cache/apt/archives/*.deb apt-archives 2>/dev/null || true

      - name: Extract Go version from go.mod
        run: sed -En 's/^go (.*)$/GO_VERSION=\1/p' go.mod >> "$GITHUB_ENV"

      - name: Set up Go with cache
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache-dependency-path: ./go.sum

      - name: Install dependencies
        run: go mod download

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UDS tokenizer image
        uses: docker/build-push-action@v6
        with:
          context: services/uds_tokenizer
          tags: llm-d-uds-tokenizer:e2e-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run make e2e-test
        run: make e2e-test
