name: CI - Build UDS Tokenizer Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        shell: bash

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA:0:7}"
            echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "image=ghcr.io/${{ github.repository_owner }}/llm-d-uds-tokenizer:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "image=llm-d-uds-tokenizer:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Build and push UDS tokenizer image
        uses: ./.github/actions/docker-build-and-push
        with:
          tag: ${{ steps.tag.outputs.tag }}
          image-name: llm-d-uds-tokenizer
          registry: ghcr.io/${{ github.repository_owner }}
          github-token: ${{ secrets.GHCR_TOKEN }}
          context: services/uds_tokenizer
          dockerfile: services/uds_tokenizer/Dockerfile
          platform: linux/amd64,linux/arm64

      - name: Run Trivy scan
        if: github.event_name == 'push'
        uses: ./.github/actions/trivy-scan
        with:
          image: ghcr.io/${{ github.repository_owner }}/llm-d-uds-tokenizer:${{ steps.tag.outputs.tag }}
