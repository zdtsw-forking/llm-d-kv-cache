apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 300Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-storage-files
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2000Gi
