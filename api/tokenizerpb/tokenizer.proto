syntax = "proto3";

package tokenization;

option go_package = "github.com/llm-d/llm-d-kv-cache/api/tokenizerpb;tokenizerpb";

// TokenizeRequest represents a request to tokenize a text input
message TokenizeRequest {
  string input = 1;           // The text input to tokenize
  string model_name = 2;      // The name of the model to use for tokenization
  bool add_special_tokens = 3; // Whether to add special tokens during tokenization
}

// TokenizeResponse represents the response from tokenization
message TokenizeResponse {
  repeated uint32 input_ids = 1;           // Token IDs for the input
  bool success = 2;                        // Whether the request was successful
  string error_message = 3;                // Error message if the request failed
  // Direct array of [start, end] pairs
  repeated uint32 offset_pairs = 4;        // Flattened array of [start, end, start, end, ...]
}


// ConversationTurn represents a single turn in a conversation (a single message or multiple messages per turn)
message ConversationTurn {
  repeated ChatMessage messages = 1;      // The messages in this turn
}

// ChatTemplateRequest represents a request to render a chat template
message ChatTemplateRequest {
  repeated ConversationTurn conversation_turns = 1; // The conversation turns (batches of messages)
  repeated ToolDescription tools = 2;     // Tools available to the conversation
  repeated Document documents = 3;        // Documents related to the conversation
  string chat_template = 4;               // The chat template to use
  bool return_assistant_tokens_mask = 5;  // Whether to return assistant token mask
  bool continue_final_message = 6;        // Whether to continue the final message
  bool add_generation_prompt = 7;         // Whether to add generation prompt
  map<string, Value> chat_template_kwargs = 8; // Additional chat template arguments
  string model_name = 9;                  // The name of the model to use for tokenization
}

// ImageUrl represents the image_url content block field
message ImageUrl {
  string url = 1; // URL of the image (http/https or data URI)
}

// ContentPart represents a single part of a multimodal message content block
message ContentPart {
  string type = 1;                 // "text" or "image_url"
  optional string text = 2;       // Text content (type == "text")
  optional ImageUrl image_url = 3; // Image content (type == "image_url")
}

// ChatMessage represents a single message in a conversation.
// Mirrors Content in pkg/tokenization/types: set content for plain text,
// content_parts for multimodal (image_url blocks). Exactly one should be set.
message ChatMessage {
  string role = 1;                        // Role of the message (e.g., "user", "assistant", "system")
  optional string content = 2;           // Plain-text content (Content.Raw)
  repeated ContentPart content_parts = 3; // Multimodal content blocks (Content.Structured)
}

// ToolDescription represents a description of a tool
message ToolDescription {
  map<string, Value> tool = 1;  // Tool definition
}

// Document represents a document
message Document {
  map<string, Value> document = 1;  // Document definition
}

// Value represents a generic value that can be string, number, bool, or list
message Value {
  oneof value {
    string string_value = 1;
    double number_value = 2;
    bool bool_value = 3;
    ListValue list_value = 4;
    StructValue struct_value = 5;
  }
}

// ListValue represents a list of values
message ListValue {
  repeated Value values = 1;
}

// StructValue represents a structured value (key-value pairs)
message StructValue {
  map<string, Value> fields = 1;
}

// ChatTemplateResponse represents the response from rendering a chat template
message ChatTemplateResponse {
  string rendered_prompt = 1;      // The rendered chat template prompt
  bool success = 2;                // Whether the request was successful
  string error_message = 3;        // Error message if the request failed
}

// InitializeTokenizerRequest represents a request to initialize tokenizer for a model
message InitializeTokenizerRequest {
  string model_name = 1;      // The name of the model to initialize
  bool enable_thinking = 2;   // Whether to enable thinking tokens
  bool add_generation_prompt = 3; // Whether to add generation prompt
}

// InitializeTokenizerResponse represents the response from tokenizer initialization
message InitializeTokenizerResponse {
  bool success = 1;           // Whether the initialization was successful
  string error_message = 2;   // Error message if initialization failed
}

// PlaceholderRange represents a range of placeholder tokens for a multimodal item
message PlaceholderRange {
  int32 offset = 1; // Start index of the placeholder tokens in the prompt
  int32 length = 2; // Number of placeholder tokens
}

// StringList holds a list of strings (used as map values)
message StringList {
  repeated string values = 1;
}

// PlaceholderRangeList holds a list of PlaceholderRange (used as map values)
message PlaceholderRangeList {
  repeated PlaceholderRange ranges = 1;
}

// MultiModalFeatures contains multimodal metadata produced by the render step
message MultiModalFeatures {
  map<string, StringList> mm_hashes = 1;                  // Per-modality item hashes
  map<string, PlaceholderRangeList> mm_placeholders = 2;  // Per-modality placeholder ranges
}

// RenderChatCompletionRequest contains the fields from an OpenAI chat completion
// request that are relevant to rendering (chat template application + tokenization).
message RenderChatCompletionRequest {
  string model_name = 1;                       // Model name to use for renderer selection
  repeated ChatMessage messages = 2;           // Conversation messages
  optional string tools_json = 3;              // Tools available to the model, as a JSON array
  string chat_template = 4;                    // Override chat template (optional)
  optional bool add_generation_prompt = 5;     // Whether to append the generation prompt (default: true)
  bool continue_final_message = 6;             // Whether to continue the final message
  optional string chat_template_kwargs = 7; // Additional chat template arguments as JSON
}

// RenderChatCompletionResponse contains the rendered output from OpenAIServingRender
message RenderChatCompletionResponse {
  string request_id = 1;            // Request ID from the render response
  repeated uint32 token_ids = 2;    // Token IDs for the rendered input
  MultiModalFeatures features = 3;  // Multimodal features (populated for MM inputs)
  bool success = 4;                 // Whether the request was successful
  string error_message = 5;         // Error message if the request failed
}

// RenderCompletionRequest contains the fields from an OpenAI completion request
// that are relevant to rendering (validation + tokenization).
message RenderCompletionRequest {
  string model_name = 1; // Model name to use for renderer selection
  string prompt = 2;     // Text prompt to render
}

// RenderCompletionResponse contains the rendered output for a completion request.
message RenderCompletionResponse {
  string request_id = 1;         // Request ID from the render response
  repeated uint32 token_ids = 2; // Token IDs for the rendered prompt
  bool success = 3;              // Whether the request was successful
  string error_message = 4;      // Error message if the request failed
}

// TokenizationService defines the gRPC service for tokenization
service TokenizationService {
  // Tokenize converts a text input to token IDs
  rpc Tokenize(TokenizeRequest) returns (TokenizeResponse);

  // Deprecated: use RenderChatCompletion instead.
  rpc RenderChatTemplate(ChatTemplateRequest) returns (ChatTemplateResponse);

  // InitializeTokenizer initializes the tokenizer for a specific model
  rpc InitializeTokenizer(InitializeTokenizerRequest) returns (InitializeTokenizerResponse);

  // RenderChatCompletion renders an OpenAI chat completion request via OpenAIServingRender,
  // returning token IDs and multimodal features as a GenerateRequest-compatible response
  rpc RenderChatCompletion(RenderChatCompletionRequest) returns (RenderChatCompletionResponse);

  // RenderCompletion renders an OpenAI completion request via OpenAIServingRender,
  // returning the rendered output for the given prompt
  rpc RenderCompletion(RenderCompletionRequest) returns (RenderCompletionResponse);
}